project: CodeBook UI Design System

theme:
  style:
    - Terminal Futurism
    - Academic Cyber UI
    - Structured Minimalism
    - Editorial Developer Design

  mood:
    - Intellectual
    - Futuristic
    - Technical
    - Premium

colors:
  accent: "#00FFC2"

  backgrounds:
    main: "#121212"
    section: "#151515"
    surface: "#181818"
    editor: "#111111"
    deepDark: "#0a0a0a"

  text:
    primary: "#FFFFFF"
    secondary: "#A3A3A3"
    muted: "#737373"

  border:
    primary: "#262626"

  syntax:
    keyword: "#00FFC2"
    conditional: "#C678DD"
    string: "#E5C07B"
    error: "#FF6B6B"
    warning: "#FFAA6B"

  systemIndicators:
    close: "bg-red-500/80"
    minimize: "bg-yellow-500/80"
    success: "bg-green-500/80"

typography:
  primaryFont: "Space Grotesk"
  monoFont: "Monospace"
  heroFont: "Sans Serif"

  weights:
    bold: "font-bold"
    medium: "font-medium"
    lightItalic: "font-light italic"

  tracking:
    tight: "tracking-tight"
    tighter: "tracking-tighter"
    widest: "tracking-widest"

  scale:
    heroDesktop: "text-8xl"
    heroMobile: "text-6xl"
    ctaLarge: "text-7xl"
    sectionHeading: "text-4xl"
    cardTitle: "text-2xl"
    bodyLarge: "text-lg"
    body: "text-sm"
    label: "text-xs"
    tiny: "text-[10px]"

spacing:
  padding:
    small: "p-4"
    medium: "p-6"
    large: "p-8"

  sections:
    standard: "py-24"
    large: "py-32"

  buttons:
    standard: "px-8 py-4"
    large: "px-12 py-6"

layout:
  containerPadding: "px-6 md:px-24"

  responsivePatterns:
    flexResponsive: "flex flex-col md:flex-row"
    featureGrid: "grid-cols-1 md:grid-cols-2"
    bentoGrid: "md:grid-cols-12"

  philosophy:
    - Spacious layouts
    - Strong hierarchy
    - Modular panels
    - Cinematic spacing
    - Controlled readability

borders:
  default: "border-neutral-800"

  philosophy:
    - Borders over shadows
    - Thin structural outlines
    - Modular compartmentalization

cards:
  standard:
    background: "#181818"
    border: "border-neutral-800"
    padding: "p-8"
    transition: "transition-all"

  interactive:
    hoverBorder: "hover:border-[#00FFC2]/50"

buttons:
  primary:
    background: "#00FFC2"
    text: "#121212"
    font: "font-bold"
    transform: "uppercase"
    tracking: "tracking-widest"
    hover: "hover:brightness-110"
    transition: "transition-all"

  secondary:
    border: "border-neutral-700"
    text: "#FFFFFF"
    hover: "hover:bg-neutral-800"
    transition: "transition-all"

effects:
  transition: "transition-all"
  activeScale: "active:scale-95"

  animations:
    marquee:
      duration: "20s"
      timing: "linear"
      iteration: "infinite"

visualMotifs:
  - Notebook Pattern
  - IDE Window
  - Indentation Guides
  - Cursor Indicators
  - Terminal Interface
  - Floating Metrics Panels
  - Editorial Typography

patterns:
  notebook:
    backgroundImage: "linear-gradient(to bottom, #1f1f1f 1px, transparent 1px)"
    backgroundSize: "100% 24px"

components:
  navbar:
    features:
      - Fixed positioning
      - Accent active states
      - Compact spacing

  hero:
    features:
      - Cinematic typography
      - Split layout
      - Strong CTA hierarchy

  editorWindow:
    features:
      - Window controls
      - Syntax highlighting
      - Indentation guides
      - Monospace structure

  bentoGrid:
    features:
      - Uneven modular layouts
      - Strong hierarchy
      - Dashboard feeling

  manifestoSection:
    features:
      - Oversized typography
      - Minimal visuals
      - Editorial storytelling

utilityClasses:
  panel: |
    .panel {
      @apply bg-[#181818] border border-neutral-800;
    }

  accentLabel: |
    .accent-label {
      @apply text-[#00FFC2] uppercase tracking-widest text-xs font-bold;
    }

  primaryButton: |
    .primary-btn {
      @apply bg-[#00FFC2] text-[#121212]
      font-bold uppercase tracking-widest transition-all;
    }

  secondaryButton: |
    .secondary-btn {
      @apply border border-neutral-700
      text-white transition-all;
    }

designGenre:
  - Neo Brutalism (Soft)
  - Terminal Futurism
  - Academic Cyber UI
  - Structured Minimalism
  - Editorial Technical Design

summary:
  strengths:
    - Strong visual identity
    - Consistent spacing
    - Clear typography hierarchy
    - Reusable modular structure
    - Distinct futuristic academic aesthetic